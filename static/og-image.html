<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; list-style: none; }
  html, body {
    width: 1200px;
    height: 630px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .top {
    flex: 1;
    background: #0a1628;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .title {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #ffffff;
  }
  .bottom {
    height: 340px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .by-text {
    font-size: 24px;
    color: rgba(0,0,0,0.5);
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .logo { height: 130px; }
</style>
</head>
<body>
  <div class="top">
    <div class="title">NEQ RENEWAL</div>
  </div>
  <div class="bottom">
    <span class="by-text">by</span>
    <img class="logo" src="Logo-Permits-Canada-Web.png" alt="Permits Canada">
  </div>
</body>
</html>
