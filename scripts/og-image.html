<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0a1628 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #c41e3a, #ffffff, #c41e3a);
  }
  .accent-line-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #c41e3a, #ffffff, #c41e3a);
  }
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .title {
    font-size: 96px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
  }
  .title span {
    color: #c41e3a;
  }
  .divider {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }
  .subtitle {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }
  .by-text {
    font-size: 28px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .logo {
    height: 90px;
    filter: brightness(1.1);
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <div class="content">
    <div class="title">NEQ <span>RENEWAL</span></div>
    <div class="divider"></div>
    <div class="subtitle">
      <span class="by-text">by</span>
      <img class="logo" src="Logo-Permits-Canada-Web.png" alt="Permits Canada">
    </div>
  </div>
  <div class="accent-line-bottom"></div>
</body>
</html>
